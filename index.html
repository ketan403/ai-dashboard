<!DOCTYPE html>
<html>
<head>
  <title>AI Vision Control</title>

  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 30px;
    }

    .panel {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 320px;
    }

    video {
      width: 100%;
      border-radius: 10px;
    }

    #status {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>🤖 AI Vision Auto Detection</h1>

<div class="container">

  <div class="panel">
    <h3>📷 Camera</h3>
    <video id="cam" autoplay muted></video>
  </div>

  <div class="panel">
    <h3>🧠 AI Status</h3>
    <p id="status">Loading AI...</p>
  </div>

</div>

<script>
  const video = document.getElementById("cam");
  const statusText = document.getElementById("status");

  // Start camera
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => video.srcObject = stream);

  // Load AI model
  Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models')
  ]).then(startAI);

  function startAI() {
    statusText.innerText = "AI Ready";

    setInterval(async () => {
      const detections = await faceapi.detectAllFaces(
        video,
        new faceapi.TinyFaceDetectorOptions()
      );

      if (detections.length > 0) {
        statusText.innerText = "FACE DETECTED";
        send(1);
      } else {
        statusText.innerText = "NO FACE";
        send(0);
      }
    }, 2000);
  }

  function send(val) {
    fetch("http://192.168.29.222/data?face=" + val)
      .catch(() => {});
  }
</script>

</body>
</html>
