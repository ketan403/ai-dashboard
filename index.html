<!DOCTYPE html>
<html>
<head>
  <title>AI Vision Auto Detection</title>

  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .panel {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 340px;
      position: relative;
    }

    video {
      width: 100%;
      border-radius: 10px;
    }

    canvas {
      position: absolute;
      top: 60px;
      left: 20px;
    }

    #status {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🤖 AI Vision Auto Detection</h1>

<div class="container">

  <!-- CAMERA -->
  <div class="panel" id="cameraPanel">
    <h3>📷 Camera</h3>
    <video id="cam" autoplay muted playsinline></video>
  </div>

  <!-- STATUS -->
  <div class="panel">
    <h3>🧠 AI Status</h3>
    <p id="status">Loading AI...</p>
  </div>

</div>

<script>
  const video = document.getElementById("cam");
  const statusText = document.getElementById("status");

  let lastSent = null;

  // 📷 START CAMERA
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      video.srcObject = stream;
    })
    .catch(() => {
      alert("Camera permission denied!");
    });

  // 🧠 LOAD MODELS FROM YOUR GITHUB
  async function loadModels() {
    try {
      await faceapi.nets.tinyFaceDetector.loadFromUri('/ai-dashboard/models');

      statusText.innerText = "AI Ready 🚀";
      startAI();

    } catch (err) {
      console.error(err);
      statusText.innerText = "AI failed to load ❌";
    }
  }

  // 🚀 START AI
  function startAI() {

    const canvas = faceapi.createCanvasFromMedia(video);
    document.getElementById("cameraPanel").append(canvas);

    const displaySize = { width: video.clientWidth, height: video.clientHeight };
    faceapi.matchDimensions(canvas, displaySize);

    setInterval(async () => {

      const detections = await faceapi.detectAllFaces(
        video,
        new faceapi.TinyFaceDetectorOptions()
      );

      const resized = faceapi.resizeResults(detections, displaySize);

      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      faceapi.draw.drawDetections(canvas, resized);

      if (detections.length > 0) {
        statusText.innerText = "FACE DETECTED 😎";

        if (lastSent !== 1) {
          send(1);
          lastSent = 1;
        }

      } else {
        statusText.innerText = "NO FACE 😶";

        if (lastSent !== 0) {
          send(0);
          lastSent = 0;
        }
      }

    }, 800);
  }

  // 📡 SEND TO ESP32
  function send(val) {
    fetch("http://192.168.29.222/data?face=" + val)
      .catch(() => {
        console.log("ESP not reachable");
      });
  }

  // 🔥 INIT
  loadModels();
</script>

</body>
</html>
