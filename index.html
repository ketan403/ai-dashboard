<!DOCTYPE html>
<html>
<head>
  <title>AI Vision Auto Detection</title>

  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 30px;
    }

    .panel {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 320px;
    }

    video {
      width: 100%;
      border-radius: 10px;
    }

    #status {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🤖 AI Vision Auto Detection</h1>

<div class="container">

  <!-- CAMERA -->
  <div class="panel">
    <h3>📷 Camera</h3>
    <video id="cam" autoplay muted playsinline></video>
  </div>

  <!-- AI STATUS -->
  <div class="panel">
    <h3>🧠 AI Status</h3>
    <p id="status">Loading AI...</p>
  </div>

</div>

<script>
  const video = document.getElementById("cam");
  const statusText = document.getElementById("status");

  // 📷 START CAMERA
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      video.srcObject = stream;
    })
    .catch(() => {
      alert("Camera permission denied!");
    });

  // 🧠 LOAD MODELS (FIXED CDN)
  async function loadModels() {
    await faceapi.nets.tinyFaceDetector.loadFromUri(
      'https://justadudewhohacks.github.io/face-api.js/models'
    );
    startAI();
  }

  // 🚀 START AI
  function startAI() {
    statusText.innerText = "AI Ready 🚀";

    setInterval(async () => {
      const detections = await faceapi.detectAllFaces(
        video,
        new faceapi.TinyFaceDetectorOptions()
      );

      if (detections.length > 0) {
        statusText.innerText = "FACE DETECTED 😎";
        send(1);
      } else {
        statusText.innerText = "NO FACE 😶";
        send(0);
      }
    }, 1500);
  }

  // 📡 SEND TO ESP32
  function send(val) {
    fetch("http://192.168.29.222/data?face=" + val)
      .catch(() => {
        console.log("ESP not reachable");
      });
  }

  // 🔥 INIT
  loadModels();
</script>

</body>
</html>
